<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1+2+3 Seater Sofa</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f2ed;
}

.header{
background:#111;
padding:20px;
text-align:center;
}

.header a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

.title{
background:white;
padding:40px 20px;
text-align:center;
}

.title h1{
margin:0;
font-size:42px;
}

.product{
background:white;
padding:40px 20px;
text-align:center;
margin-bottom:20px;
}

.product img{
width:85%;
max-width:900px;
display:block;
margin:auto;
}

.btn{
margin-top:20px;
padding:15px 40px;
background:#111;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:9999;
}

.popup-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:95%;
max-height:95%;
}

.popup-content img{
max-width:100%;
max-height:90vh;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:60px;
color:white;
cursor:pointer;
}

@media(max-width:768px){

.product img{
width:95%;
}

.title h1{
font-size:30px;
}

.btn{
width:80%;
}

}

</style>

</head>

<body>

<div class="header">
<a href="index.html">← BACK TO HOME</a>
</div>

<div class="title">
<h1>1+2+3 SEATER SOFA COLLECTION</h1>
<p>ROVENO Premium Collection</p>
</div>

<!-- 333 -->

<div class="product">

<img src="333.jpg">

<button class="btn" onclick="openPopup('popup333')">
VIEW SIZE
</button>

</div>

<!-- 360 -->

<div class="product">

<img src="360.jpg">

<button class="btn" onclick="openPopup('popup360')">
VIEW SIZE
</button>

</div>

<!-- POPUP 333 -->

<div id="popup333" class="popup">

<span class="close"
onclick="closePopup('popup333')">
×
</span>

<div class="popup-content">
<img src="CZ333SIZE.png">
</div>

</div>

<!-- POPUP 360 -->

<div id="popup360" class="popup">

<span class="close"
onclick="closePopup('popup360')">
×
</span>

<div class="popup-content">
<img src="CZ360SIZE.png">
</div>

</div>

<script>

function openPopup(id){
document.getElementById(id).style.display="block";
}

function closePopup(id){
document.getElementById(id).style.display="none";
}

window.onclick=function(event){

let p333=document.getElementById("popup333");
let p360=document.getElementById("popup360");

if(event.target==p333){
p333.style.display="none";
}

if(event.target==p360){
p360.style.display="none";
}

}

</script>

</body>
</html>
