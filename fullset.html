<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>1+2+3 SEATER SOFA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f2ed;
}

.header{
background:#111;
padding:20px;
text-align:center;
}

.header a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

.title{
background:white;
padding:40px;
text-align:center;
}

.product{
background:white;
padding:40px 20px;
text-align:center;
margin-bottom:20px;
}

.product img{
width:85%;
max-width:900px;
display:block;
margin:auto;
}

.btn{
margin-top:20px;
padding:15px 40px;
background:#111;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:9999;
}

.popup img{
max-width:95%;
max-height:95%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:60px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<a href="index.html">← BACK TO HOME</a>
</div>

<div class="title">
<h1>1+2+3 SEATER SOFA COLLECTION</h1>
</div>

<div class="product">

<img src="333.jpg">

<br>

<button class="btn" onclick="open333()">
VIEW SIZE
</button>

</div>

<div class="product">

<img src="360.jpg">

<br>

<button class="btn" onclick="open360()">
VIEW SIZE
</button>

</div>

<div id="popup333" class="popup">

<span class="close" onclick="close333()">
×
</span>

<img src="CZ333SIZE.png">

</div>

<div id="popup360" class="popup">

<span class="close" onclick="close360()">
×
</span>

<img src="CZ360SIZE.png">

</div>

<script>

function open333(){
document.getElementById("popup333").style.display="block";
}

function close333(){
document.getElementById("popup333").style.display="none";
}

function open360(){
document.getElementById("popup360").style.display="block";
}

function close360(){
document.getElementById("popup360").style.display="none";
}

</script>

</body>
</html>
