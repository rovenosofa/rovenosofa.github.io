<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>L Shape Sofa</title>

<style>

body{
margin:0;
background:#f5f2ed;
font-family:Arial;
text-align:center;
}

.header{
background:#111;
padding:20px;
}

.header a{
color:white;
text-decoration:none;
font-weight:bold;
}

.title{
padding:40px 20px;
background:white;
}

.product{
background:white;
padding:40px 20px;
margin-bottom:20px;
}

.product img{
width:70%;
max-width:700px;
margin:auto;
display:block;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:#111;
color:white;
text-decoration:none;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
}

.popup img{
width:70%;
max-width:800px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:50px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<a href="index.html">← BACK TO HOME</a>
</div>

<div class="title">
<h1>L SHAPE SOFA COLLECTION</h1>
</div>

<!-- 189 -->

<div class="product">

<img src="189.jpg">

<br>

<button class="btn"
onclick="document.getElementById('size189').style.display='block'">
VIEW SIZE
</button>

</div>

<div id="size189" class="popup">

<span class="close"
onclick="document.getElementById('size189').style.display='none'">
×
</span>

<img src="CZ189 SIZE.png">

</div>

<!-- 202 -->

<div class="product">
<img src="202.jpg">
</div>

<!-- 488 -->

<div class="product">
<img src="488.jpg">
</div>

</body>
</html>
